services:
  laravel:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/lanchonete
    ports:
      - 8000:8000
    
  node:
    build:
      context: .
      dockerfile: Dockerfile.vite
    volumes:
      - ./:/lanchonete
      - ./node_modules/:/lanchonete/node_modules
    ports: 
      - 5173:5173
    

volumes:
  lanchonete:
  node_modules:

